name: Release Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './widget/src-tauri -> target'

      - name: Install app dependencies
        run: |
          cd widget
          npm install

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            TAG_VERSION="1.0.0"
          fi
          echo "Updating tauri.conf.json version to $TAG_VERSION"
          node -e "
            const fs = require('fs');
            const file = './widget/src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            config.package.version = '$TAG_VERSION';
            fs.writeFileSync(file, JSON.stringify(config, null, 2), 'utf8');
          "

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TodoFlow ${{ github.ref_name }}'
          releaseBody: 'Release generated automatically by GitHub Actions.'
          releaseDraft: true
          prerelease: false
          projectPath: './widget'
