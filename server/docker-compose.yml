version: '3.8'

services:
  todo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoflow-api-server
    user: "root"
    restart: always
    ports:
      - "8299:8000"
    volumes:
      - todoflow_db_volume:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/todo.db}
      - API_KEYS_RAW=${API_KEYS_RAW:-widget-token-secure-789,ai-agent-token-secure-101}
      - ENV=${ENV:-production}
    networks:
      - nginx_default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  todoflow_db_volume:

networks:
  nginx_default:
    external: true

